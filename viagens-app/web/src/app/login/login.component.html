<main class="auth-page">
  <section class="auth-card">
    <div class="brand-block">
      <img class="brand-logo auth-logo" src="/mochilaok-logo.jpeg" alt="MochilaOK" />
      <h1>Bem-vindo ao MochilaOK</h1>
      <p>Organize suas viagens de forma simples.</p>
    </div>

    <p *ngIf="error" class="alert error-alert">{{ error }}</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form-stack">
      <label class="field">
        <span>E-mail</span>
        <input type="email" formControlName="email" placeholder="seu@email.com" autocomplete="email" />
      </label>

      <label class="field">
        <span>Senha</span>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </label>

      <div class="auth-actions-link">
        <a routerLink="/register">Criar conta</a>
      </div>

      <button class="btn btn-primary btn-full" type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-footer-text">
      Ainda não tem uma conta?
      <a routerLink="/register">Cadastre-se agora</a>
    </p>
  </section>
</main>
