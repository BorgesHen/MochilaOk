<h2>Minhas Viagens</h2>

<p *ngIf="error" style="color:red">{{ error }}</p>

<h3>Criar viagem</h3>
<form [formGroup]="form" (ngSubmit)="create()">
  <input placeholder="Título" formControlName="title" />
  <input placeholder="Local (opcional)" formControlName="location" />
  <button type="submit">Criar</button>
</form>

<hr />

<ul>
  <li *ngFor="let d of destinations">
    <a [routerLink]="['/destinations', d.id]">
      <b>{{ d.title }}</b>
    </a>
    <span *ngIf="d.location"> — {{ d.location }}</span>
    <small> ({{ d.my_role }})</small>
  </li>
</ul>
