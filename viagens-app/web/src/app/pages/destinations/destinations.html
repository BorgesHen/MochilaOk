<section class="page">
    <header>
        <h2>Minhas viagens</h2>

        <button type="button" (click)="logout()">
            Sair
        </button>
    </header>

    <p *ngIf="error" style="color: red">
        {{ error }}
    </p>

    <button type="button" (click)="openCreateForm()" *ngIf="!showForm">
        + Criar nova viagem
    </button>

    <form *ngIf="showForm" [formGroup]="form" (ngSubmit)="create()" style="margin-top: 20px">
        <h3>Nova viagem</h3>

        <div>
            <label>Título da viagem</label><br />
            <input type="text" formControlName="title" placeholder="Ex: Viagem para Ubatuba" />
        </div>

        <div style="margin-top: 10px">
            <label>Destino / local</label><br />
            <input type="text" formControlName="location" placeholder="Ex: Ubatuba - SP" />
        </div>

        <div style="margin-top: 12px">
            <button type="submit">
                Salvar viagem
            </button>

            <button type="button" (click)="cancelCreate()">
                Cancelar
            </button>
        </div>
    </form>

    <hr />

    <h3>Viagens cadastradas</h3>

    <p *ngIf="destinations.length === 0">
        Nenhuma viagem cadastrada ainda.
    </p>

    <ul>
        <li *ngFor="let d of destinations">
            <a [routerLink]="['/destinations', d.id]">
                <strong>{{ d.title }}</strong>
            </a>

            <span *ngIf="d.location">
                — {{ d.location }}
            </span>

            <small>
                ({{ d.my_role }})
            </small>
        </li>
    </ul>
</section>
