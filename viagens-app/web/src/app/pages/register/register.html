<main class="auth-page">
  <section class="auth-card">
    <div class="brand-block">
      <img class="brand-logo auth-logo" src="/mochilaok-logo.jpeg" alt="MochilaOK" />
      <h1>Criar conta</h1>
      <p>Monte suas viagens, listas e responsabilidades em um só lugar.</p>
    </div>

    <p *ngIf="error" class="alert error-alert">{{ error }}</p>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="form-stack">
      <label class="field">
        <span>Nome</span>
        <input
          type="text"
          name="name"
          [(ngModel)]="nome"
          placeholder="Seu nome"
          autocomplete="name"
          required
        />
      </label>

      <label class="field">
        <span>E-mail</span>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="seu@email.com"
          autocomplete="email"
          required
        />
      </label>

      <label class="field">
        <span>Senha</span>
        <input
          type="password"
          name="password"
          [(ngModel)]="senha"
          placeholder="••••••••"
          autocomplete="new-password"
          required
        />
      </label>

      <button class="btn btn-primary btn-full" type="submit" [disabled]="registerForm.invalid || loading">
        {{ loading ? 'Cadastrando...' : 'Criar conta' }}
      </button>
    </form>

    <p class="auth-footer-text">
      Já tem uma conta?
      <a routerLink="/login">Entrar</a>
    </p>
  </section>
</main>
