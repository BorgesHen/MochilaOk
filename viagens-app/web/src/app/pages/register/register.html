<div class="register-container">
    <h2>Criar Conta</h2>
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
        <div class="form-group">
            <label for="username">Nome de Usuário</label>
            <input type="text" id="username" name="username" [(ngModel)]="nome" placeholder="nome de usuário" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="email" required>
        </div>
        <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" [(ngModel)]="senha" placeholder="senha" required>
        </div>
        <button type="submit" [disabled]="registerForm.invalid || loading">
            {{ loading ? 'Cadastrando...' : 'Criar conta' }}
        </button>
    </form>
    <p *ngIf="error" class="erro">{{ error }}</p>
    </div>
